<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingliz Iboralari — 1000+ Ibora</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap');

  :root{
    --deep: #0c3b45;
    --deep2: #0f4a56;
    --panel: #113f4b;
    --gold: #cc9a3a;
    --gold-light: #e8c675;
    --turquoise: #2fb6ac;
    --turquoise-dim: #1f7d78;
    --cream: #f8f1e0;
    --cream-dim: #d9cfb4;
    --ink: #17272b;
    --good: #3fae6a;
    --bad: #d0563f;
    --radius: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at 15% 8%, rgba(47,182,172,0.18), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(204,154,58,0.14), transparent 45%),
      var(--deep);
    color:var(--cream);
    min-height:100vh;
    padding: 18px 14px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}

  /* ---- signature tile border ---- */
  .tileband{
    height:14px;
    width:100%;
    background-image: repeating-linear-gradient(135deg,
      var(--gold) 0 8px, var(--turquoise) 8px 16px, var(--cream) 16px 20px, var(--deep2) 20px 24px);
    border-radius: 8px;
    opacity:0.9;
    margin-bottom:18px;
  }

  header.top{ text-align:center; margin-bottom: 6px; }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    margin: 4px 0 2px;
    letter-spacing: 0.2px;
  }
  .subtitle{
    color: var(--cream-dim);
    font-size: 0.95rem;
    margin-bottom: 14px;
  }

  .stats-strip{
    display:flex; align-items:center; justify-content:center; gap:14px;
    font-family:'Roboto Mono', monospace;
    font-size:0.85rem;
    color: var(--gold-light);
    margin-bottom: 18px;
    flex-wrap:wrap;
  }
  .stats-strip b{ color:var(--cream); font-size:1rem; }
  .overall-bar{
    height:6px; width:100%; max-width:320px; background:rgba(255,255,255,0.12);
    border-radius:4px; overflow:hidden; margin: 0 auto 20px;
  }
  .overall-bar > div{ height:100%; background: linear-gradient(90deg, var(--turquoise), var(--gold)); }

  .search-row{
    display:flex; gap:8px; margin-bottom:18px;
  }
  .search-row input{
    flex:1; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06); color: var(--cream); font-size:0.95rem;
  }
  .search-row input::placeholder{ color: var(--cream-dim); }

  /* category grid */
  #home .grid{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
    gap: 12px;
  }
  .cat-card{
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 14px 14px 12px;
    cursor:pointer;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .cat-card:hover{ transform: translateY(-3px); border-color: var(--turquoise); box-shadow: 0 10px 24px rgba(0,0,0,0.35); }
  .cat-card .name{ font-weight:600; font-size:0.98rem; margin-bottom:6px; line-height:1.25;}
  .cat-card .count{ font-size:0.78rem; color:var(--cream-dim); margin-bottom:8px; }
  .cat-card .bar{ height:5px; background:rgba(255,255,255,0.12); border-radius:3px; overflow:hidden;}
  .cat-card .bar>div{ height:100%; background:var(--gold); }

  /* study screen */
  #study{ display:none; }
  .backrow{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .back-btn{
    background:none; border:1px solid rgba(255,255,255,0.2); color:var(--cream);
    padding:8px 14px; border-radius:10px; cursor:pointer; font-size:0.9rem;
  }
  .cat-title{ font-family:'Fraunces',serif; font-weight:600; font-size:1.3rem; text-align:center; flex:1;}

  .tabs{ display:flex; gap:8px; justify-content:center; margin-bottom:18px; }
  .tab{
    padding:10px 18px; border-radius:12px; border:none; cursor:pointer;
    background: rgba(255,255,255,0.08); color:var(--cream-dim); font-weight:600; font-size:0.9rem;
  }
  .tab.active{ background: var(--turquoise); color:#06231f; }

  /* flashcard */
  .card{
    background: var(--cream);
    color: var(--ink);
    border-radius: 20px;
    padding: 44px 28px;
    min-height: 220px;
    text-align:center;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative;
    border: 3px solid var(--gold);
  }
  .card .eyebrow{ font-family:'Roboto Mono',monospace; font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:var(--turquoise-dim); margin-bottom:14px;}
  .card .front-text{ font-size:1.35rem; font-weight:600; line-height:1.4; }
  .card .back-text{ display:none; font-size:1.15rem; margin-top:18px; color:var(--turquoise-dim); font-weight:600; line-height:1.4; }
  .card .hint{ position:absolute; bottom:12px; right:16px; font-size:0.7rem; color:#9a9284; }

  .progress-row{ display:flex; align-items:center; gap:10px; justify-content:center; margin: 14px 0 6px; font-family:'Roboto Mono',monospace; font-size:0.85rem; color:var(--cream-dim);}
  .mini-bar{ flex:1; max-width:220px; height:6px; background:rgba(255,255,255,0.12); border-radius:3px; overflow:hidden;}
  .mini-bar>div{ height:100%; background:var(--turquoise); }

  .controls{ display:flex; justify-content:center; gap:10px; margin-top:18px; flex-wrap:wrap; }
  .controls button{
    padding: 12px 18px; border:none; border-radius:12px; cursor:pointer; font-weight:600; font-size:0.88rem;
    background: var(--gold); color:#2b1c04;
  }
  .controls button.secondary{ background: rgba(255,255,255,0.1); color:var(--cream); }
  .controls button.mastered-btn{ background: var(--good); color:white; }
  .controls button:disabled{ opacity:0.4; cursor:default; }

  /* quiz */
  #quizArea{ display:none; }
  .quiz-q{
    background: var(--panel); border-radius:16px; padding:24px 20px; text-align:center;
    font-size:1.15rem; font-weight:600; margin-bottom:18px; border:1px solid rgba(255,255,255,0.08);
  }
  .quiz-q .qlabel{ font-family:'Roboto Mono',monospace; font-size:0.7rem; color:var(--gold-light); letter-spacing:1.5px; text-transform:uppercase; display:block; margin-bottom:10px;}
  .options{ display:flex; flex-direction:column; gap:10px; }
  .opt-btn{
    padding:14px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06); color:var(--cream); text-align:left; cursor:pointer; font-size:0.95rem;
  }
  .opt-btn:hover{ border-color: var(--turquoise); }
  .opt-btn.correct{ background: var(--good); border-color: var(--good); color:white; }
  .opt-btn.wrong{ background: var(--bad); border-color: var(--bad); color:white; }
  .opt-btn:disabled{ cursor:default; }
  .quiz-score{ text-align:center; font-family:'Roboto Mono',monospace; color:var(--gold-light); margin-bottom:10px; font-size:0.9rem;}
  .quiz-next{ text-align:center; margin-top:16px; }
  .quiz-next button{ padding:12px 22px; border-radius:12px; border:none; background:var(--turquoise); color:#06231f; font-weight:700; cursor:pointer;}

  /* list view */
  #listArea{ display:none; }
  .list-item{
    background: var(--panel); border-radius:12px; padding:14px 16px; margin-bottom:8px;
    display:flex; justify-content:space-between; gap:12px; align-items:center; border:1px solid rgba(255,255,255,0.06);
  }
  .list-item .eng{ font-weight:600; }
  .list-item .uzb{ color: var(--gold-light); font-size:0.9rem; text-align:right;}
  .list-item.done{ opacity:0.55; }
  .list-item .check{ font-size:1.1rem; }

  footer.note{ text-align:center; font-size:0.75rem; color:var(--cream-dim); margin-top:30px; }
  .empty{ text-align:center; color:var(--cream-dim); padding:30px 0; }
</style>
</head>

<div class="wrap">
  <div class="tileband"></div>
  <header class="top">
    <h1>Ingliz Iboralari</h1>
    <p class="subtitle">1000+ hayotiy ibora &middot; 47 bo'lim &middot; Flashcard, Quiz va Ro'yxat rejimlari</p>
  </header>

  <div class="stats-strip">
    <span><b id="overallMastered">0</b> yodlandi</span>
    <span>/</span>
    <span><b id="overallTotal">0</b> jami</span>
  </div>
  <div class="overall-bar"><div id="overallBar" style="width:0%"></div></div>

  <div id="home">
    <div class="search-row">
      <input id="searchBox" type="text" placeholder="Ibora yoki bo'lim qidirish...">
    </div>
    <div class="grid" id="catGrid"></div>
  </div>

  <div id="study">
    <div class="backrow">
      <button class="back-btn" onclick="goHome()">&larr; Orqaga</button>
      <div class="cat-title" id="studyTitle"></div>
      <div style="width:80px"></div>
    </div>

    <div class="tabs">
      <button class="tab" id="tabFlash" onclick="switchMode('flashcard')">📇 Flashcard</button>
      <button class="tab" id="tabQuiz" onclick="switchMode('quiz')">❓ Quiz</button>
      <button class="tab" id="tabList" onclick="switchMode('list')">📋 Ro'yxat</button>
    </div>

    <div id="flashArea">
      <div class="card" id="flashcard" onclick="flipCard()">
        <div class="eyebrow" id="eyebrow">INGLIZCHA</div>
        <div class="front-text" id="frontText"></div>
        <div class="back-text" id="backText"></div>
        <div class="hint">bosing ↻</div>
      </div>
      <div class="progress-row">
        <span id="cardPos">1 / 1</span>
        <div class="mini-bar"><div id="cardBar" style="width:0%"></div></div>
      </div>
      <div class="controls">
        <button class="secondary" onclick="prevCard()">⬅ Oldingi</button>
        <button class="secondary" onclick="shuffleCards()">🔀 Aralashtirish</button>
        <button onclick="nextCard()">Keyingi ➡</button>
        <button class="mastered-btn" onclick="toggleMastered()" id="masterBtn">✅ Yodlandi</button>
      </div>
    </div>

    <div id="quizArea">
      <div class="quiz-score">Ball: <span id="quizScore">0</span> / <span id="quizTotal">0</span></div>
      <div class="quiz-q">
        <span class="qlabel" id="quizLabel">INGLIZCHASI QANDAY?</span>
        <span id="quizQuestion"></span>
      </div>
      <div class="options" id="quizOptions"></div>
      <div class="quiz-next" id="quizNextWrap" style="display:none;">
        <button onclick="nextQuizQuestion()">Keyingi savol ➡</button>
      </div>
    </div>

    <div id="listArea"></div>
  </div>

  <footer class="note">Progress avtomatik saqlanadi. Har bir ibora ustiga bosib, tarjimasini ko'ring.</footer>
</div>

PHRASES.forEach((p,i)=>{ p.id = i; });

let mastered = new Set();
let currentCat = null;
let currentList = [];
let cardIndex = 0;
let mode = 'flashcard';
let flipped = false;
let quizQueue = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;

// ---------- storage ----------
async function loadMastered(){
  try{
    const res = await window.storage.get('mastered-ids');
    if(res && res.value){ mastered = new Set(JSON.parse(res.value)); }
  }catch(e){ mastered = new Set(); }
}
async function saveMastered(){
  try{ await window.storage.set('mastered-ids', JSON.stringify([...mastered])); }
  catch(e){ console.error('storage error', e); }
}

function categories(){
  const map = {};
  PHRASES.forEach(p=>{ (map[p.cat] = map[p.cat]||[]).push(p); });
  return map;
}

function renderHome(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  const cats = categories();
  const query = document.getElementById('searchBox').value.trim().toLowerCase();

  Object.keys(cats).forEach(cat=>{
    const items = cats[cat];
    if(query && !cat.toLowerCase().includes(query) &&
       !items.some(p=>p.eng.toLowerCase().includes(query) || p.uzb.toLowerCase().includes(query))){
      return;
    }
    const total = items.length;
    const done = items.filter(p=>mastered.has(p.id)).length;
    const pct = Math.round(done/total*100);
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.onclick = ()=>openCategory(cat);
    card.innerHTML = `
      <div class="name">${cat}</div>
      <div class="count">${done}/${total} yodlandi</div>
      <div class="bar"><div style="width:${pct}%"></div></div>
    `;
    grid.appendChild(card);
  });

  if(!grid.children.length){
    grid.innerHTML = '<div class="empty">Hech narsa topilmadi</div>';
  }
  updateOverall();
}

function updateOverall(){
  document.getElementById('overallTotal').textContent = PHRASES.length;
  document.getElementById('overallMastered').textContent = mastered.size;
  document.getElementById('overallBar').style.width = Math.round(mastered.size/PHRASES.length*100)+'%';
}

function goHome(){
  document.getElementById('home').style.display='block';
  document.getElementById('study').style.display='none';
  renderHome();
}

function openCategory(cat){
  currentCat = cat;
  currentList = PHRASES.filter(p=>p.cat===cat);
  cardIndex = 0;
  document.getElementById('home').style.display='none';
  document.getElementById('study').style.display='block';
  document.getElementById('studyTitle').textContent = cat;
  switchMode('flashcard');
}

function switchMode(m){
  mode = m;
  document.getElementById('tabFlash').classList.toggle('active', m==='flashcard');
  document.getElementById('tabQuiz').classList.toggle('active', m==='quiz');
  document.getElementById('tabList').classList.toggle('active', m==='list');
  document.getElementById('flashArea').style.display = m==='flashcard' ? 'block':'none';
  document.getElementById('quizArea').style.display = m==='quiz' ? 'block':'none';
  document.getElementById('listArea').style.display = m==='list' ? 'block':'none';

  if(m==='flashcard'){ showCard(); }
  if(m==='quiz'){ startQuiz(); }
  if(m==='list'){ renderList(); }
}

// ---------- flashcards ----------
function showCard(){
  const p = currentList[cardIndex];
  document.getElementById('frontText').textContent = p.eng;
  document.getElementById('backText').textContent = p.uzb;
  document.getElementById('cardPos').textContent = (cardIndex+1)+' / '+currentList.length;
  document.getElementById('cardBar').style.width = Math.round((cardIndex+1)/currentList.length*100)+'%';
  flipped = false;
  updateFlip();
  updateMasterBtn();
}
function updateFlip(){
  document.getElementById('frontText').style.display = flipped ? 'none':'block';
  document.getElementById('backText').style.display = flipped ? 'block':'none';
  document.getElementById('eyebrow').textContent = flipped ? "O'ZBEKCHASI" : "INGLIZCHASI";
}
function flipCard(){ flipped = !flipped; updateFlip(); }
function nextCard(){ cardIndex = (cardIndex+1) % currentList.length; showCard(); }
function prevCard(){ cardIndex = (cardIndex-1+currentList.length) % currentList.length; showCard(); }
function shuffleCards(){
  for(let i=currentList.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [currentList[i],currentList[j]]=[currentList[j],currentList[i]];
  }
  cardIndex = 0;
  showCard();
}
function updateMasterBtn(){
  const p = currentList[cardIndex];
  const btn = document.getElementById('masterBtn');
  btn.textContent = mastered.has(p.id) ? "✅ Yodlangan" : "✅ Yodlandi";
}
async function toggleMastered(){
  const p = currentList[cardIndex];
  if(mastered.has(p.id)) mastered.delete(p.id); else mastered.add(p.id);
  await saveMastered();
  updateMasterBtn();
  updateOverall();
  nextCard();
}

// ---------- quiz ----------
function startQuiz(){
  quizQueue = [...currentList];
  for(let i=quizQueue.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [quizQueue[i],quizQueue[j]]=[quizQueue[j],quizQueue[i]];
  }
  quizIdx = 0;
  quizScore = 0;
  document.getElementById('quizTotal').textContent = quizQueue.length;
  document.getElementById('quizScore').textContent = quizScore;
  showQuizQuestion();
}

function showQuizQuestion(){
  quizAnswered = false;
  document.getElementById('quizNextWrap').style.display = 'none';
  if(quizIdx >= quizQueue.length){
    document.getElementById('quizQuestion').textContent = '';
    document.getElementById('quizOptions').innerHTML =
      `<div class="empty">Tugadi! Natija: ${quizScore} / ${quizQueue.length}</div>`;
    document.getElementById('quizNextWrap').style.display='block';
    document.getElementById('quizNextWrap').innerHTML = '<button onclick="startQuiz()">Qayta boshlash 🔁</button>';
    return;
  }
  const p = quizQueue[quizIdx];
  const askEnglish = Math.random() < 0.5;
  document.getElementById('quizLabel').textContent = askEnglish ? "BU IBORANING O'ZBEKCHASI QAYSI?" : "BU IBORANING INGLIZCHASI QAYSI?";
  document.getElementById('quizQuestion').textContent = askEnglish ? p.eng : p.uzb;

  let wrongPool = currentList.filter(x=>x.id!==p.id);
  if(wrongPool.length < 3){ wrongPool = PHRASES.filter(x=>x.id!==p.id); }
  const wrongs = [];
  const usedIdx = new Set();
  while(wrongs.length < 3 && wrongs.length < wrongPool.length){
    const idx = Math.floor(Math.random()*wrongPool.length);
    if(usedIdx.has(idx)) continue;
    usedIdx.add(idx);
    wrongs.push(wrongPool[idx]);
  }
  const options = [p, ...wrongs].map(x=> askEnglish ? x.uzb : x.eng);
  for(let i=options.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [options[i],options[j]]=[options[j],options[i]];
  }
  const correctAnswer = askEnglish ? p.uzb : p.eng;

  const optWrap = document.getElementById('quizOptions');
  optWrap.innerHTML = '';
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = ()=> answerQuiz(btn, opt, correctAnswer, p);
    optWrap.appendChild(btn);
  });
}

async function answerQuiz(btn, opt, correctAnswer, p){
  if(quizAnswered) return;
  quizAnswered = true;
  const allBtns = document.querySelectorAll('#quizOptions .opt-btn');
  allBtns.forEach(b=>{
    b.disabled = true;
    if(b.textContent === correctAnswer) b.classList.add('correct');
  });
  if(opt === correctAnswer){
    quizScore++;
    mastered.add(p.id);
    await saveMastered();
    updateOverall();
  } else {
    btn.classList.add('wrong');
  }
  document.getElementById('quizScore').textContent = quizScore;
  document.getElementById('quizNextWrap').style.display = 'block';
}
function nextQuizQuestion(){
  quizIdx++;
  showQuizQuestion();
}

// ---------- list ----------
function renderList(){
  const wrap = document.getElementById('listArea');
  wrap.innerHTML = '';
  currentList.forEach(p=>{
    const done = mastered.has(p.id);
    const row = document.createElement('div');
    row.className = 'list-item' + (done ? ' done':'');
    row.innerHTML = `
      <div>
        <div class="eng">${p.eng}</div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="uzb">${p.uzb}</div>
        <span class="check" style="cursor:pointer" data-id="${p.id}">${done ? '✅' : '⬜'}</span>
      </div>
    `;
    row.querySelector('.check').onclick = async (e)=>{
      e.stopPropagation();
      if(mastered.has(p.id)) mastered.delete(p.id); else mastered.add(p.id);
      await saveMastered();
      updateOverall();
      renderList();
    };
    wrap.appendChild(row);
  });
}

document.getElementById('searchBox').addEventListener('input', renderHome);

(async function init(){
  await loadMastered();
  renderHome();
})();
</script>
